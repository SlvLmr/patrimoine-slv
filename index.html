  <!-- Mobile overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden backdrop-blur-sm"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-64 bg-dark-900 border-r border-dark-400/15 flex flex-col -translate-x-full lg:translate-x-0 transition-all duration-300">
    <!-- Logo + collapse toggle -->
    <div id="sidebar-logo" class="p-5 pr-8 border-b border-dark-400/20 flex items-center justify-center">
      <!-- Populated by JS -->
    </div>
    <button id="sidebar-collapse-btn" class="hidden lg:flex absolute -right-3 top-7 w-6 h-6 items-center justify-center rounded-full bg-dark-600 border border-dark-400/30 text-gray-400 hover:text-gray-200 hover:bg-dark-500 transition z-50 shadow-md" title="Réduire le menu">
      <svg id="collapse-icon" class="w-3.5 h-3.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>

    <!-- Navigation -->
    <nav id="nav-links" class="flex-1 p-4 space-y-0 overflow-y-auto">
      <!-- Populated by JS -->
    </nav>

    <!-- Dropdown arrow (profiles, export, import, etc.) -->
    <div id="profile-switcher" class="relative border-t border-dark-400/20 px-4 py-2 flex items-center justify-center">
      <button id="profile-dropdown-btn" class="p-1.5 rounded-lg hover:bg-dark-600 transition cursor-pointer" title="Options">
        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
        </svg>
      </button>
    </div>

    <!-- User bar (auth) -->
    <div id="user-bar" class="border-t border-dark-400/20">
      <!-- Populated by JS -->
    </div>

  </aside>

  <!-- Main content -->

    <header class="lg:hidden sticky top-0 z-30 bg-dark-800/80 backdrop-blur-md border-b border-dark-400/20 px-4 py-3 flex items-center gap-3">
