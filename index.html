<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon — Simulateur Patrimonial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script type="module" src="js/app.js?v=5"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0b0b0f',
              800: '#111115',
              700: '#1a1a1f',
              600: '#222228',
              500: '#2c2c33',
              400: '#38383f',
              300: '#4a4a52',
            },
            accent: {
              green: '#c9a76c',
              red: '#ff4757',
              blue: '#a08553',
              purple: '#b8976c',
              amber: '#dbb88a',
              cyan: '#d4b07a',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark-900 font-sans text-gray-200 min-h-screen">

  <!-- Tailwind CDN safelist: force generation of classes used in JS components -->
  <div class="hidden"
    data-tw="bg-dark-900 bg-dark-800 bg-dark-700 bg-dark-600 bg-dark-500 bg-dark-400 bg-dark-300
    text-dark-900 text-dark-800 text-dark-700 text-dark-600 text-dark-500 text-dark-400 text-dark-300
    border-dark-900 border-dark-800 border-dark-700 border-dark-600 border-dark-500 border-dark-400 border-dark-300
    bg-dark-800/50 bg-dark-800/30 bg-dark-600/30 bg-dark-400/50 bg-dark-400/30 bg-dark-400/20 bg-dark-400/10 bg-dark-500/50 bg-dark-300/30
    border-dark-400/50 border-dark-400/30 border-dark-400/20 border-dark-500/50 border-dark-300/30
    text-accent-green text-accent-red text-accent-blue text-accent-purple text-accent-amber text-accent-cyan
    bg-accent-green bg-accent-red bg-accent-blue bg-accent-purple bg-accent-amber bg-accent-cyan
    bg-accent-green/10 bg-accent-green/15 bg-accent-green/20 bg-accent-green/5
    bg-accent-red/10 bg-accent-red/20 bg-accent-blue/10 bg-accent-blue/15 bg-accent-blue/20 bg-accent-blue/5 bg-accent-blue/40
    hover:bg-dark-600 hover:bg-dark-500 hover:text-accent-green hover:opacity-90
    focus:ring-accent-blue/40 focus:border-accent-blue/40 focus:ring-accent-blue/50 focus:border-accent-blue/50
    from-accent-green to-accent-blue from-accent-red to-rose-500 from-purple-600 to-purple-500 from-amber-500 to-amber-400
    text-accent-red/60 text-accent-red/70 text-accent-blue/80 text-accent-green/60 text-accent-green/80 text-accent-red/80
    hover:text-accent-red hover:text-accent-blue/80 hover:text-accent-blue
    bg-purple-500/20 bg-amber-500/20 bg-amber-500/10 bg-accent-red/20
    text-purple-400 text-purple-400/80 text-amber-400 text-amber-400/80 text-amber-300/80
    bg-amber-500 bg-accent-green/80
    from-dark-700 via-dark-600 to-dark-700 from-accent-green/5 to-accent-blue/5 from-accent-green/20 to-accent-blue/20
    bg-red-500/10 hover:bg-red-500/10 text-red-400/70 hover:text-red-400 text-red-400
    bg-accent-blue/5 hover:border-dark-300/40
    from-dark-800 via-dark-800 to-dark-900 border-dark-400/30
    from-accent-green via-accent-cyan to-accent-blue
    from-accent-red to-rose-500 bg-sky-500/15 text-sky-400
    text-emerald-400 text-teal-400 text-cyan-400 text-pink-400 text-orange-400 text-indigo-400 text-yellow-400 text-lime-400/80 text-teal-400/80
    focus:ring-accent-green/40 focus:border-accent-green/40">
  </div>

  <!-- Mobile overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden backdrop-blur-sm"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-64 bg-gradient-to-b from-dark-800 via-dark-800 to-dark-900 border-r border-dark-400/20 flex flex-col -translate-x-full lg:translate-x-0 transition-transform">
    <!-- Logo -->
    <div id="sidebar-logo" class="p-5 border-b border-dark-400/20">
      <!-- Populated by JS -->
    </div>

    <!-- Profile switcher -->
    <div id="profile-switcher" class="relative px-4 py-3 border-b border-dark-400/20 cursor-pointer hover:bg-dark-700 transition">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 flex items-center justify-center">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
          </div>
          <span id="profile-name" class="text-sm font-medium text-gray-200 truncate">Mon patrimoine</span>
        </div>
        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
    </div>

    <!-- Navigation -->
    <nav id="nav-links" class="flex-1 p-4 space-y-1 overflow-y-auto">
      <!-- Populated by JS -->
    </nav>

    <!-- User bar (auth) -->
    <div id="user-bar" class="border-t border-dark-400/20">
      <!-- Populated by JS -->
    </div>

    <!-- Bottom actions -->
    <div class="p-4 border-t border-dark-400/20 space-y-1">
      <button id="btn-export" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:text-accent-green hover:bg-dark-600 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Sauvegarder
      </button>
      <button id="btn-import" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:text-accent-green hover:bg-dark-600 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        Importer
      </button>
      <button id="btn-reset" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-red-400/70 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Réinitialiser
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="main-content" class="lg:ml-64 min-h-screen">
    <!-- Top bar (mobile) -->
    <header class="lg:hidden sticky top-0 z-30 bg-dark-800/80 backdrop-blur-md border-b border-dark-400/20 px-4 py-3 flex items-center gap-3">
      <button id="menu-toggle" class="p-2 rounded-lg hover:bg-dark-600 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div id="mobile-logo"><!-- Populated by JS --></div>
    </header>

    <!-- Page content -->
    <main id="app-content" class="p-4 sm:p-6 lg:p-8 max-w-7xl">
      <div class="flex items-center justify-center h-64">
        <p class="text-gray-500">Chargement...</p>
      </div>
    </main>
  </div>

</body>
</html>
