<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patrimoine SLV — Simulateur Patrimonial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script type="module" src="js/app.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen">

  <!-- Mobile overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-64 bg-white border-r border-gray-100 shadow-sm flex flex-col -translate-x-full lg:translate-x-0 transition-transform">
    <!-- Logo -->
    <div class="p-6 border-b border-gray-100">
      <h1 class="text-xl font-bold text-indigo-600">Patrimoine SLV</h1>
      <p class="text-xs text-gray-400 mt-1">Simulateur patrimonial</p>
    </div>

    <!-- Navigation -->
    <nav id="nav-links" class="flex-1 p-4 space-y-1 overflow-y-auto">
      <!-- Populated by JS -->
    </nav>

    <!-- Bottom actions -->
    <div class="p-4 border-t border-gray-100 space-y-2">
      <button id="btn-export" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Exporter (JSON)
      </button>
      <button id="btn-import" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        Importer (JSON)
      </button>
      <button id="btn-reset" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Réinitialiser
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="main-content" class="lg:ml-64 min-h-screen">
    <!-- Top bar (mobile) -->
    <header class="lg:hidden sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3 flex items-center gap-3">
      <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <h1 class="text-lg font-bold text-indigo-600">Patrimoine SLV</h1>
    </header>

    <!-- Page content -->
    <main id="app-content" class="p-4 sm:p-6 lg:p-8 max-w-7xl">
      <!-- Populated by JS -->
      <div class="flex items-center justify-center h-64">
        <p class="text-gray-400">Chargement...</p>
      </div>
    </main>
  </div>

</body>
</html>
